<h1>Product List</h1>
<a href="{% url 'products:create' %}">+ Add Product</a>

<table>
  <thead>
    <tr>
      <th>SKU</th>
      <th>Name</th>
      <th>Category</th>
      <th>Has Variant</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    {% for p in products %}
    <tr>
      <td>{{ p.sku }}</td>
      <td>{{ p.name }}</td>
      <td>{{ p.category }}</td>
      <td>{{ p.has_variant }}</td>
      <td>
        <a href="{% url 'products:detail' p.id %}">Detail</a> |
        <a href="{% url 'products:update' p.id %}">Edit</a> |
        <a href="{% url 'products:delete' p.id %}">Delete</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<style>
  table {
    border-collapse: collapse;
    width: 100%;
  }

  table, th, td {
    border: 1px solid #ccc;
  }

  th, td {
    padding: 8px 12px;
    text-align: left;
  }
</style>
