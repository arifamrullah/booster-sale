<h3>Variants</h3>

{{ variant_formset.management_form }}

<div id="variant-container">
    {% for form in variant_formset %}
        {% include "products/partials/variant_form.html" %}
    {% endfor %}
</div>

<button
    type="button"
    hx-get="{% url 'products:variant_empty_form' %}"
    hx-target="#variant-container"
    hx-swap="beforeend"
    hx-on="htmx:afterRequest:
        let total = document.getElementById('id_variants-TOTAL_FORMS');
        let formCount = parseInt(total.value);
        let newForm = document.querySelector('#variant-container .variant-form:last-child');
        newForm.innerHTML = newForm.innerHTML.replace(/__prefix__/g, formCount);
        total.value = formCount + 1;">
    + Add Variant
</button>
